<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ocean Science Solutions</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="icon" href="assets/src/logo.png" type="image/png">
</head>
<body>
    <div class="top-bar">
        <div class="company-name">Ocean Science Solutions</div>
    </div>
    
    <div class="video-container">
        <video autoplay muted loop>
            <source src="assets/video/clip.mp4" type="video/mp4">
            Your browser does not support HTML5 video.
        </video>
    </div>

    <div class="content">
        <h1>Unlock the depths of your data</h1>
    </div>

    <div class="section">
        <h2>We specialize in data management and custom automated solutions to bring data to the forefront of decision making.</h2>
    </div>
    
    <div class="parallax">
        <div class="email-box">
            <h2>Contact Us</h2>
            <form id="contact-form" action="https://formsubmit.co/info@oceanscientific.net" method="POST">
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" required>
                
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>
                
                <label for="message">Message:</label>
                <textarea id="message" name="message" rows="4" required></textarea>
                
                <button type="submit">Send</button>
                
            </form>
        </div>
    </div>
    <script>
        window.onload = function() {
            // Get the form element
            const form = document.getElementById("contact-form");

            form.addEventListener("submit", function(event) {
                // Show a success alert before form is actually submitted
                event.preventDefault();  // Prevent form from submitting immediately
    
                // Trigger success alert
                alert("Thank you for your message! We will respond shortly.");
    
                // Now, submit the form after the alert
                form.submit();  // Continue submitting the form to FormSubmit
            });
        };
    </script>
</body>
</html>
